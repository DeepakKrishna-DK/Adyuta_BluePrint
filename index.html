<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ADYUTA – Automated Architecture Blueprint</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top, #060b20 0%, #02030a 55%, #000 100%);
      color: #e8f4ff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
      text-align: center;
    }

    h2 {
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: #7fd1ff;
      text-align: center;
    }

    #container {
      position: relative;
      width: 1000px;
      max-width: 100%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    #diagram {
      width: 100%;
      display: block;
    }

    .zone {
      position: absolute;
      border-radius: 18px;
      pointer-events: none;
      box-shadow: 0 0 0 rgba(0,0,0,0);
      transition: box-shadow 0.25s ease-out, transform 0.25s ease-out;
    }

    /* Approximate overlays – tweak if needed to align with your image */

    /* Edge clients */
    #phone  { left: 13%; top: 64%; width: 20%; height: 22%; }
    #laptop { left: 40%; top: 64%; width: 20%; height: 22%; }
    #pc     { left: 67%; top: 64%; width: 20%; height: 22%; }

    /* Orchestrator slab */
    #orch   { left: 31%; top: 38%; width: 38%; height: 22%; }

    /* Dashboard */
    #dash   { left: 32%; top: 9%; width: 36%; height: 18%; }

    /* Data tunnels */
    #tunL   { left: 17%; top: 27%; width: 8%; height: 45%; }
    #tunR   { left: 75%; top: 27%; width: 8%; height: 45%; }

    /* Glow styles */
    .g-local   { box-shadow: 0 0 32px 7px rgba(255, 80, 80, 0.9); }
    .g-fl      { box-shadow: 0 0 32px 7px rgba(60, 180, 255, 0.9); }
    .g-agg     { box-shadow: 0 0 32px 7px rgba(230, 250, 255, 0.85); }
    .g-mpc     { box-shadow: 0 0 32px 7px rgba(180, 100, 255, 0.9); }
    .g-audit   { box-shadow: 0 0 32px 7px rgba(0, 255, 140, 0.9); }
    .g-id      { box-shadow: 0 0 26px 6px rgba(255, 230, 120, 0.9); }

    .pulse {
      animation: pulse 1.2s ease-in-out infinite alternate;
    }
    .flow-up {
      animation: flowUp 1.8s ease-in-out infinite;
    }
    .flow-down {
      animation: flowDown 1.8s ease-in-out infinite;
    }
    .float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }
    @keyframes flowUp {
      0%   { transform: translateY(4px); }
      50%  { transform: translateY(-4px); }
      100% { transform: translateY(4px); }
    }
    @keyframes flowDown {
      0%   { transform: translateY(-4px); }
      50%  { transform: translateY(4px); }
      100% { transform: translateY(-4px); }
    }
    @keyframes float {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    /* Phase explanation panel */

    #phase-panel {
      margin-top: 10px;
      width: 1000px;
      max-width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(3,7,16,0.97);
      border: 1px solid rgba(120,190,255,0.7);
      font-size: 0.86rem;
    }
    #phase-title {
      font-weight: 600;
      color: #7fd1ff;
      margin-bottom: 4px;
    }
    #phase-text {
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <h1>ADYUTA – Inner Working Architecture Blueprint</h1>
  <h2>Automatically showing how each layer works and how data flows between them</h2>

  <div id="container">
    <img id="diagram" src="adyuta_architecture.png" alt="ADYUTA Architecture" />

    <!-- Overlay zones -->
    <div id="phone"  class="zone"></div>
    <div id="laptop" class="zone"></div>
    <div id="pc"     class="zone"></div>

    <div id="orch"   class="zone"></div>
    <div id="dash"   class="zone"></div>

    <div id="tunL"   class="zone"></div>
    <div id="tunR"   class="zone"></div>
  </div>

  <div id="phase-panel">
    <div id="phase-title">Phase 0 – Initializing ADYUTA blueprint…</div>
    <div id="phase-text">
      ADYUTA sits as an invisible security layer above existing operating systems, preparing all clients and cloud services.
    </div>
  </div>

  <script>
    const zones = ['phone','laptop','pc','orch','dash','tunL','tunR'];

    function resetZones() {
      zones.forEach(id => {
        const el = document.getElementById(id);
        el.className = 'zone';
      });
    }

    function addClasses(id, classes) {
      const el = document.getElementById(id);
      el.classList.add(...classes);
    }

    function setPhase(title, text) {
      document.getElementById('phase-title').textContent = title;
      document.getElementById('phase-text').textContent  = text;
    }

    // Each phase: explain AND visually highlight the part doing that job
    async function phase1_localAI() {
      setPhase(
        'Phase 1 – Edge Privacy Layer: Local AI defence',
        'User Phone, NGO Laptop and Student PC run local ADYUTA clients. Each device uses on-device AI models to detect scams, phishing and harassment, keeping all raw messages on the endpoint.'
      );
      addClasses('phone',  ['g-local','pulse']);
      addClasses('laptop', ['g-local','pulse']);
      addClasses('pc',     ['g-local','pulse']);
      await new Promise(r => setTimeout(r, 2600));
      resetZones();
    }

    async function phase2_zkpIdentity() {
      setPhase(
        'Phase 2 – Zero-Knowledge Identity: Proving without revealing',
        'Users and NGOs prove properties like “over 18”, “belongs to this NGO” or “basic controls enabled” using zero-knowledge proofs. Identities and incident details are never exposed.'
      );
      addClasses('phone',  ['g-id','pulse']);
      addClasses('laptop', ['g-id','pulse']);
      addClasses('pc',     ['g-id','pulse']);
      await new Promise(r => setTimeout(r, 2200));
      resetZones();
    }

    async function phase3_federatedLearning() {
      setPhase(
        'Phase 3 – Federated Learning: Encrypted model updates to ADYUTA Orchestrator',
        'Without sending any raw text, devices ship encrypted model gradients to the ADYUTA Orchestrator. The orchestrator aggregates these updates to continually improve global detection models.'
      );
      addClasses('phone',  ['g-fl','flow-up']);
      addClasses('laptop', ['g-fl','flow-up']);
      addClasses('pc',     ['g-fl','flow-up']);
      addClasses('orch',   ['g-fl','float']);
      await new Promise(r => setTimeout(r, 2800));
      resetZones();
    }

    async function phase4_mpcZkp() {
      setPhase(
        'Phase 4 – MPC & PSI: Shared threats without data sharing',
        'Using secure multi-party computation and private set intersection, NGOs collaboratively compute shared scam numbers, domains and patterns. The orchestrator learns overlaps, but no organisation reveals its full case data.'
      );
      addClasses('orch', ['g-mpc','pulse']);
      addClasses('tunL', ['g-mpc']);
      addClasses('tunR', ['g-mpc']);
      await new Promise(r => setTimeout(r, 2600));
      resetZones();
    }

    async function phase5_governance() {
      setPhase(
        'Phase 5 – Governance Layer: Aggregated risk & Proof-of-Protection',
        'The NGO Dashboard receives only aggregated, anonymized metrics: risk trends, FL accuracy, compliance levels and proof-of-protection reports. No personal messages or victim details ever reach this layer.'
      );
      addClasses('orch', ['g-agg','flow-up']);
      addClasses('dash', ['g-agg','pulse']);
      await new Promise(r => setTimeout(r, 2800));
      resetZones();
    }

    async function phase6_auditTrail() {
      setPhase(
        'Phase 6 – Audit & Integrity Tunnels',
        'Encrypted audit trails and integrity hashes flow through the vertical privacy tunnels. This gives NGOs legal and forensic readiness while still respecting confidentiality and data minimisation.'
      );
      addClasses('tunL', ['g-audit','flow-down']);
      addClasses('tunR', ['g-audit','flow-down']);
      await new Promise(r => setTimeout(r, 2400));
      resetZones();
    }

    async function loop() {
      while (true) {
        await phase1_localAI();
        await phase2_zkpIdentity();
        await phase3_federatedLearning();
        await phase4_mpcZkp();
        await phase5_governance();
        await phase6_auditTrail();
      }
    }

    loop();
  </script>
</body>
</html>
